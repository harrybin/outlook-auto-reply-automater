name: Check Lockfile Sync

on:
    pull_request:
        paths:
            - 'package.json'
            - 'package-lock.json'

permissions:
    contents: read

jobs:
    check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            - name: Verify lockfile is in sync
              run: |
                  npm ci --dry-run 2>&1 || {
                    echo ""
                    echo "::error::package-lock.json is out of sync with package.json."
                    echo "::error::Run 'npm install' locally, commit the updated package-lock.json, and push again."
                    exit 1
                  }
