name: Deploy GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: true

jobs:
    build:
        runs-on: ubuntu-latest
        env:
            DEPLOY_BASE_URL: https://outlook-auto-reply-automater.harrybin.de
            VITE_BASE_PATH: /
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Verify lockfile is up to date
              run: |
                  BEFORE=$(jq 'del(.version, .packages[""].version)' package-lock.json)
                  npm install --package-lock-only
                  AFTER=$(jq 'del(.version, .packages[""].version)' package-lock.json)
                  if [ "$BEFORE" != "$AFTER" ]; then
                    echo "::error::package-lock.json is stale. Run 'npm install' locally and commit the updated lockfile."
                    exit 1
                  fi

            - name: Install dependencies
              run: npm ci

            - name: Build web assets
              run: npm run build:ci

            - name: Create deployment bundle
              run: npm run pack -- "$DEPLOY_BASE_URL"

            - name: Set Pages custom domain
              run: echo "outlook-auto-reply-automater.harrybin.de" > dist/deployment/web/CNAME

            - name: Upload manifest artifact
              uses: actions/upload-artifact@v4
              with:
                  name: outlook-addin-manifest
                  path: dist/deployment/manifest.json

            - name: Setup Pages
              uses: actions/configure-pages@v5

            - name: Upload Pages artifact
              uses: actions/upload-pages-artifact@v3
              with:
                  path: dist/deployment/web

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - name: Deploy to GitHub Pages
              id: deployment
              uses: actions/deploy-pages@v4
