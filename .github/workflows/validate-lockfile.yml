name: Validate lockfile

on:
    pull_request:
        paths:
            - package.json
            - package-lock.json
    push:
        branches: [main]
        paths:
            - package.json
            - package-lock.json

jobs:
    lockfile:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 24
                  cache: npm

            - name: Verify lockfile is up to date
              run: |
                  npm install --package-lock-only
                  git diff --exit-code package-lock.json || (
                    echo "::error::package-lock.json is stale. Run 'npm install' locally and commit the updated lockfile."
                    exit 1
                  )
